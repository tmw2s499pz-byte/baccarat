<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>百家樂流暢算牌器 (按局輸入版)</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #ffffff;
            --text-secondary: #aaaaaa;
            --player-color: #007aff;
            --banker-color: #ff3b30;
            --tie-color: #34c759;
            --accent-color: #ffcc00;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            padding: 12px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            text-align: center;
            padding-bottom: 8px;
            border-bottom: 1px solid #333;
        }

        header h1 {
            font-size: 1.1rem;
            color: var(--accent-color);
        }

        /* 儀表板 */
        .dashboard {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 10px;
            margin: 10px 0;
        }

        .panel {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 10px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .panel-title {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 2px;
        }

        .panel-value {
            font-size: 1.5rem;
            font-weight: bold;
        }

        .player-text { color: var(--player-color); }
        .banker-text { color: var(--banker-color); }

        .sub-info {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        /* 當前單局輸入狀態 */
        .round-status {
            background-color: #252525;
            border-radius: 8px;
            padding: 8px;
            text-align: center;
            font-size: 0.9rem;
            margin-bottom: 10px;
            border: 1px dashed #444;
        }

        /* 兩大段式操作區 */
        .input-section {
            display: flex;
            flex-direction: column;
            gap: 10px;
            flex-grow: 1;
            justify-content: center;
        }

        .row-title {
            font-size: 0.9rem;
            font-weight: bold;
            margin-left: 4px;
        }

        .btn-group {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
        }

        .num-btn {
            background-color: #2a2a2a;
            border: 1px solid #444;
            color: var(--text-color);
            border-radius: 8px;
            padding: 12px 0;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
        }

        .num-btn:active {
            background-color: #444;
        }

        .player-group .num-btn { border-left: 4px solid var(--player-color); }
        .banker-group .num-btn { border-left: 4px solid var(--banker-color); }

        /* 功能控制 */
        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 10px;
            padding-bottom: env(safe-area-inset-bottom);
        }

        .btn {
            padding: 12px 0;
            border-radius: 8px;
            border: none;
            font-size: 0.95rem;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-undo { background-color: #3a3a3c; color: var(--text-color); }
        .btn-reset { background-color: #ff9500; color: #fff; }
    </style>
</head>
<body>

    <header>
        <h1>百家樂流暢算牌器 (極速免計張版)</h1>
    </header>

    <div class="dashboard">
        <div class="panel">
            <div class="panel-title">下一局預測推薦</div>
            <div class="panel-value" id="recommendation">等候首局</div>
            <div class="sub-info" id="advantage-diff">大數據分析中...</div>
        </div>
        <div class="panel">
            <div class="panel-title">即時預估勝率</div>
            <div class="sub-info player-text" style="font-weight:bold;">閒: <span id="prob-player">44.62%</span></div>
            <div class="sub-info banker-text" style="font-weight:bold;">莊: <span id="prob-banker">45.86%</span></div>
            <div class="sub-info" style="color:var(--tie-color)">和: <span id="prob-tie">9.52%</span></div>
        </div>
    </div>

    <div class="round-status" id="round-status-text">
        請點擊下方：輸入【本局閒家最終點數】
    </div>

    <div class="input-section">
        <div>
            <div class="row-title player-text">第一步：點擊「閒家」最終點數</div>
            <div class="btn-group player-group" style="margin-top: 5px;">
                <button class="num-btn" onclick="selectScore('P', 0)">0</button>
                <button class="num-btn" onclick="selectScore('P', 1)">1</button>
                <button class="num-btn" onclick="selectScore('P', 2)">2</button>
                <button class="num-btn" onclick="selectScore('P', 3)">3</button>
                <button class="num-btn" onclick="selectScore('P', 4)">4</button>
                <button class="num-btn" onclick="selectScore('P', 5)">5</button>
                <button class="num-btn" onclick="selectScore('P', 6)">6</button>
                <button class="num-btn" onclick="selectScore('P', 7)">7</button>
                <button class="num-btn" onclick="selectScore('P', 8)">8</button>
                <button class="num-btn" onclick="selectScore('P', 9)">9</button>
            </div>
        </div>

        <div style="margin-top: 5px;">
            <div class="row-title banker-text">第二步：點擊「莊家」最終點數</div>
            <div class="btn-group banker-group" style="margin-top: 5px;">
                <button class="num-btn" onclick="selectScore('B', 0)">0</button>
                <button class="num-btn" onclick="selectScore('B', 1)">1</button>
                <button class="num-btn" onclick="selectScore('B', 2)">2</button>
                <button class="num-btn" onclick="selectScore('B', 3)">3</button>
                <button class="num-btn" onclick="selectScore('B', 4)">4</button>
                <button class="num-btn" onclick="selectScore('B', 5)">5</button>
                <button class="num-btn" onclick="selectScore('B', 6)">6</button>
                <button class="num-btn" onclick="selectScore('B', 7)">7</button>
                <button class="num-btn" onclick="selectScore('B', 8)">8</button>
                <button class="num-btn" onclick="selectScore('B', 9)">9</button>
            </div>
        </div>
    </div>

    <div class="sub-info" style="text-align: center; margin-top: 5px;">
        已統計局數: <span id="round-count" style="font-weight:bold; color:var(--accent-color);">0</span> 局
    </div>
    <div class="controls">
        <button class="btn btn-undo" onclick="undoRound()">⬅ 回滾上一局</button>
        <button class="btn btn-reset" onclick="resetAll()">🔄 洗牌新開靴</button>
    </div>

    <script>
        let roundCount = 0;
        let tempPlayerScore = null;
        let historyRounds = [];
        let currentTrueCount = 0;

        // 統計學上，最終點數對下一局「真數(True Count)」的影響估算模型
        const P_EFFECT = { 0:-0.2, 1:-0.4, 2:-0.3, 3:-0.5, 4:-0.8, 5:0.4, 6:0.6, 7:0.5, 8:-0.2, 9:-0.1 };
        const B_EFFECT = { 0:-0.2, 1:-0.3, 2:-0.4, 3:-0.5, 4:-0.7, 5:0.5, 6:0.7, 7:0.4, 8:-0.1, 9:-0.1 };

        function selectScore(type, score) {
            if (type === 'P') {
                tempPlayerScore = score;
                document.getElementById('round-status-text').innerText = `已選 閒:${score}點 ➔ 請接著點擊【莊家最終點數】`;
                document.getElementById('round-status-text').style.color = 'var(--banker-color)';
            } else if (type === 'B') {
                if (tempPlayerScore === null) {
                    alert('請先點擊上方的閒家點數！');
                    return;
                }
                
                // 兩邊都輸入完成，結算這一局
                executeRoundEnd(tempPlayerScore, score);
            }
        }

        function executeRoundEnd(pScore, bScore) {
            // 計算這一局對牌局真數的權重變動
            let roundValue = P_EFFECT[pScore] + B_EFFECT[bScore];
            
            // 隨局數推進，後期權重放大（模擬剩餘牌數變少效應）
            roundCount++;
            let multiplier = 1 + (roundCount * 0.025); 
            let finalEffect = roundValue * multiplier;

            currentTrueCount += finalEffect;
            historyRounds.push({ p: pScore, b: bScore, effect: finalEffect });

            // 重置單局暫存
            tempPlayerScore = null;
            document.getElementById('round-status-text').innerText = `第 ${roundCount} 局已記錄！請輸入新一局【閒家點數】`;
            document.getElementById('round-status-text').style.color = 'var(--player-color)';

            updatePrediction();
        }

        function updatePrediction() {
            document.getElementById('round-count').innerText = roundCount;

            // 依據累積真數計算機率波動
            let playerShift = currentTrueCount * 0.15;
            let bankerShift = -currentTrueCount * 0.15;

            let finalPlayer = Math.max(20, Math.min(70, 44.62 + playerShift));
            let finalBanker = Math.max(20, Math.min(70, 45.86 + bankerShift));
            let finalTie = 100 - finalPlayer - finalBanker;

            document.getElementById('prob-player').innerText = finalPlayer.toFixed(2) + '%';
            document.getElementById('prob-banker').innerText = finalBanker.toFixed(2) + '%';
            document.getElementById('prob-tie').innerText = finalTie.toFixed(2) + '%';

            let recElement = document.getElementById('recommendation');
            let diffElement = document.getElementById('advantage-diff');

            // 降低門檻：只要有 1 局數據就立刻給予傾向提示，不再硬卡 12 張牌
            if (roundCount === 0) {
                recElement.innerText = "等候首局";
                recElement.className = "panel-value";
                diffElement.innerText = "大數據分析中...";
            } else {
                let diff = Math.abs(finalPlayer - finalBanker);
                if (finalPlayer > finalBanker) {
                    recElement.innerText = "推薦【閒】";
                    recElement.className = "panel-value player-text";
                    diffElement.innerText = `機率傾向閒家 (+${diff.toFixed(2)}%)`;
                } else if (finalBanker > finalPlayer) {
                    recElement.innerText = "推薦【莊】";
                    recElement.className = "panel-value banker-text";
                    diffElement.innerText = `機率傾向莊家 (+${diff.toFixed(2)}%)`;
                } else {
                    recElement.innerText = "機率對等";
                    recElement.className = "panel-value";
                    diffElement.innerText = "兩邊開出機率持平";
                }
            }
        }

        function undoRound() {
            if (historyRounds.length > 0) {
                let lastRound = historyRounds.pop();
                currentTrueCount -= lastRound.effect;
                roundCount--;
                tempPlayerScore = null;
                document.getElementById('round-status-text').innerText = `已復原！請重新輸入【閒家點數】`;
                document.getElementById('round-status-text').style.color = 'var(--player-color)';
                updatePrediction();
            }
        }

        function resetAll() {
            if (confirm("要清空所有局數，重新開始一靴新牌嗎？")) {
                roundCount = 0;
                tempPlayerScore = null;
                historyRounds = [];
                currentTrueCount = 0;
                document.getElementById('round-status-text').innerText = `已重置！請輸入新一局【閒家點數】`;
                document.getElementById('round-status-text').style.color = 'var(--player-color)';
                updatePrediction();
            }
        }
    </script>
</body>
</html>
